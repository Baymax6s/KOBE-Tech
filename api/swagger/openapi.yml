basePath: /
definitions:
  server.articleAuthorJSONResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    required:
    - id
    - name
    type: object
  server.articleErrorResponse:
    properties:
      message:
        type: string
    type: object
  server.articleJSONResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      likes_count:
        type: integer
      tags:
        items:
          $ref: '#/definitions/server.articleTagJSONResponse'
        type: array
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    required:
    - content
    - created_at
    - id
    - likes_count
    - tags
    - title
    - updated_at
    - user_id
    type: object
  server.articleTagJSONResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    required:
    - id
    - name
    type: object
  server.changePasswordErrorResponse:
    properties:
      message:
        type: string
    type: object
  server.changePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  server.changePasswordResponse:
    properties:
      message:
        type: string
    type: object
  server.createArticleRequest:
    properties:
      content:
        type: string
      tags:
        items:
          maxLength: 10
          minLength: 1
          type: string
        type: array
      title:
        type: string
    type: object
  server.createArticleResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      tags:
        items:
          $ref: '#/definitions/server.articleTagJSONResponse'
        type: array
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    required:
    - content
    - created_at
    - id
    - tags
    - title
    - updated_at
    - user_id
    type: object
  server.createReplyRequest:
    properties:
      body:
        type: string
      kind:
        type: string
      parent_id:
        type: integer
    required:
    - body
    type: object
  server.getArticleJSONResponse:
    properties:
      author:
        $ref: '#/definitions/server.articleAuthorJSONResponse'
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      likes_count:
        type: integer
      tags:
        items:
          $ref: '#/definitions/server.articleTagJSONResponse'
        type: array
      title:
        type: string
      updated_at:
        type: string
    required:
    - author
    - content
    - created_at
    - id
    - likes_count
    - tags
    - title
    - updated_at
    type: object
  server.likeCountResponse:
    properties:
      likes_count:
        type: integer
    type: object
  server.likeErrorResponse:
    properties:
      message:
        type: string
    type: object
  server.listArticlesResponse:
    properties:
      articles:
        items:
          $ref: '#/definitions/server.articleJSONResponse'
        type: array
    type: object
  server.listRepliesResponse:
    properties:
      replies:
        items:
          $ref: '#/definitions/server.replyJSONResponse'
        type: array
    required:
    - replies
    type: object
  server.listTagsResponse:
    properties:
      tags:
        items:
          $ref: '#/definitions/server.tagJSONResponse'
        type: array
    type: object
  server.loginErrorResponse:
    properties:
      message:
        type: string
    type: object
  server.loginRequest:
    properties:
      name:
        type: string
      password:
        type: string
    type: object
  server.loginResponse:
    properties:
      token:
        type: string
    type: object
  server.meErrorResponse:
    properties:
      message:
        type: string
    type: object
  server.meResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  server.replyErrorResponse:
    properties:
      message:
        type: string
    type: object
  server.replyJSONResponse:
    properties:
      article_id:
        type: integer
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      kind:
        enum:
        - comment
        - question
        - answer
        type: string
      parent_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    required:
    - article_id
    - body
    - created_at
    - id
    - kind
    - updated_at
    - user_id
    - user_name
    type: object
  server.tagJSONResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    required:
    - id
    - name
    type: object
  server.tagsErrorResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: KOBE-Tech API documentation generated from Go annotations.
  title: KOBE-Tech API
  version: 0.1.0
paths:
  /api/articles:
    get:
      description: Get article list API.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.listArticlesResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
      summary: List articles
      tags:
      - articles
    post:
      consumes:
      - application/json
      description: Create article API.
      parameters:
      - description: Create article request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server.createArticleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.createArticleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
      security:
      - BearerAuth: []
      summary: Create article
      tags:
      - articles
  /api/articles/{article_id}:
    get:
      description: Get article detail API.
      parameters:
      - description: Article ID
        in: path
        name: article_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.getArticleJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.articleErrorResponse'
      summary: Get article
      tags:
      - articles
  /api/articles/{article_id}/like:
    delete:
      description: Unlike an article API.
      parameters:
      - description: Article ID
        in: path
        name: article_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.likeCountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
      security:
      - BearerAuth: []
      summary: Unlike an article
      tags:
      - articles
    post:
      description: Like an article API.
      parameters:
      - description: Article ID
        in: path
        name: article_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.likeErrorResponse'
      security:
      - BearerAuth: []
      summary: Like an article
      tags:
      - articles
  /api/articles/{article_id}/replies:
    get:
      description: 記事に紐づく返信（コメント / 質問 / 回答）を全件取得する。
      parameters:
      - description: Article ID
        in: path
        name: article_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.listRepliesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.replyErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.replyErrorResponse'
      summary: List replies of an article
      tags:
      - replies
    post:
      consumes:
      - application/json
      description: 記事 / 既存返信への返信を投稿する。kind は comment / question / answer のいずれか。ルート投稿は
        comment か question、コメント配下は comment、質問・回答配下は answer のみ受け付ける。
      parameters:
      - description: Article ID
        in: path
        name: article_id
        required: true
        type: integer
      - description: Create reply request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server.createReplyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.replyJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.replyErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.replyErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.replyErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.replyErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a reply on an article
      tags:
      - replies
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by name and password, and returns a JWT.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.loginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.loginErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.loginErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.loginErrorResponse'
      summary: Login
      tags:
      - auth
  /api/auth/me:
    get:
      description: Returns the authenticated user identified by the JWT in the Authorization
        header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.meErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.meErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /api/auth/password:
    put:
      consumes:
      - application/json
      description: Changes the authenticated user's password.
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.changePasswordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.changePasswordErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.changePasswordErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.changePasswordErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/tags:
    get:
      description: Get tag candidates for creating articles.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.listTagsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.tagsErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.tagsErrorResponse'
      security:
      - BearerAuth: []
      summary: List tags
      tags:
      - tags
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
