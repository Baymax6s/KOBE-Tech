<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBE-Tech API Docs</title>
    <style>
        body {
            margin: 0;
            background: #fafafa;
        }

        .preview-note {
            display: none;
            margin: 16px;
            padding: 12px 16px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            background: #fff8c5;
            color: #24292f;
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .preview-note.is-visible {
            display: block;
        }
    </style>
    <link
        rel="stylesheet"
        type="text/css"
        href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css"
        integrity="sha384-ZJ2d83jl4Lvr6GKYzXpvQUmu+8us6T5frIryNHoLuypLK61jUnnCWZWyyrnifLda"
        crossorigin="anonymous"
    >
</head>
<body>
    <div id="preview-note" class="preview-note"></div>
    <div id="swagger-ui"></div>
    <script
        src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"
        integrity="sha384-yrdF3mlUytUBwQyEVFAdwuUKEC9Qqrf+IUCgFgho4O5O6irf77pMjv36FN4eTpQD"
        crossorigin="anonymous"
    ></script>
    <script
        src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"
        integrity="sha384-azzkurII4f+bjmZvm3hWhj7JezshyXtwobwneRyWCCIksK61Xi0Ry3xA2am9/TWp"
        crossorigin="anonymous"
    ></script>
    <script>
        function isStaticPreview() {
            return window.location.hostname.endsWith(".github.io");
        }

        window.onload = function() {
            const preview = isStaticPreview();
            const note = document.getElementById("preview-note");

            if (preview) {
                note.classList.add("is-visible");
                note.textContent = "GitHub Pages preview is documentation-only. Run the API locally and open http://localhost:8080/swagger/ to execute requests with Try it out.";
            }

            SwaggerUIBundle({
                url: preview ? "./openapi.yml" : "./swagger.json",
                dom_id: "#swagger-ui",
                supportedSubmitMethods: preview ? [] : ["get", "put", "post", "delete", "options", "head", "patch", "trace"],
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                layout: "BaseLayout"
            });
        };
    </script>
</body>
</html>
