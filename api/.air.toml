root = "."
tmp_dir = "bin/tmp"
env_files = [".env"]

[build]
cmd = "go build -o ./bin/tmp/api ./cmd/api"
entrypoint = ["./bin/tmp/api"]
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = [".env"]
exclude_dir = ["bin", "vendor", ".git"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
delay = 200
stop_on_error = true
send_interrupt = true
kill_delay = "200ms"

[log]
time = true

[misc]
clean_on_exit = true
