<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBE-Tech API Docs</title>
    <link
        rel="stylesheet"
        type="text/css"
        href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css"
        integrity="sha384-ZJ2d83jl4Lvr6GKYzXpvQUmu+8us6T5frIryNHoLuypLK61jUnnCWZWyyrnifLda"
        crossorigin="anonymous"
    >
</head>
<body>
    <div id="swagger-ui"></div>
    <script
        src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"
        integrity="sha384-yrdF3mlUytUBwQyEVFAdwuUKEC9Qqrf+IUCgFgho4O5O6irf77pMjv36FN4eTpQD"
        crossorigin="anonymous"
    ></script>
    <script
        src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"
        integrity="sha384-azzkurII4f+bjmZvm3hWhj7JezshyXtwobwneRyWCCIksK61Xi0Ry3xA2am9/TWp"
        crossorigin="anonymous"
    ></script>
    <script>
        window.onload = function() {
            SwaggerUIBundle({
                url: "./openapi.yml",
                dom_id: "#swagger-ui",
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                persistAuthorization: true,
                requestInterceptor: function(request) {
                    const authorization = request.headers.Authorization;
                    if (typeof authorization === "string" && authorization !== "" && !/^Bearer\s+/i.test(authorization)) {
                        request.headers.Authorization = "Bearer " + authorization;
                    }

                    return request;
                },
                layout: "BaseLayout"
            });
        };
    </script>
</body>
</html>
