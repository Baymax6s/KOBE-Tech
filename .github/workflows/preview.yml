name: preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.mod

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate Swagger
        working-directory: api
        run: |
          swag init -q -g ./cmd/api/main.go -d .,./internal --parseInternal -o ./swagger --ot json,yaml
          mv ./swagger/swagger.yaml ./swagger/openapi.yml

      - name: Preview Pages
        id: preview-pages
        uses: rajyan/preview-pages@v1
        with:
          source-dir: api/swagger
          pr-comment: "none"

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PAGES_URL: ${{ steps.preview-pages.outputs.pages-url }}
        with:
          script: |
            const pullNumber = context.payload.pull_request.number;
            const previewUrl = process.env.PAGES_URL;

            if (!previewUrl) {
              core.setFailed("pages-url output is empty");
              return;
            }

            const { owner, repo } = context.repo;
            const normalizedPreviewUrl = /^https?:\/\//i.test(previewUrl)
              ? previewUrl.replace(/^http:\/\//i, "https://")
              : `https://${previewUrl.replace(/^\/+/, "")}`;
            const expectedPrefix = `swaggerURL: https://${owner}.github.io/${repo}/pr-${pullNumber}/`;
            const commentBody = `swaggerURL: ${normalizedPreviewUrl}`;

            const created = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pullNumber,
              body: commentBody
            });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pullNumber,
              per_page: 100
            });

            for (const comment of comments) {
              if (comment.id === created.data.id) {
                continue;
              }

              if (comment.user?.login !== "github-actions[bot]") {
                continue;
              }

              if (typeof comment.body !== "string" || !comment.body.startsWith(expectedPrefix)) {
                continue;
              }

              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: comment.id
              });
            }
