name: Auto Close Issue

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  link-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number and update PR
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            // branch名から数字を抽出 (例: feature/32 -> 32)
            const match = branchName.match(/(\d+)/);

            if (!match) {
              core.info(`No issue number found in branch name: ${branchName}`);
              return;
            }

            const issueNumber = match[1];
            const body = context.payload.pull_request.body ?? "";
            const closeText = `Closes #${issueNumber}`;
            const closePattern = new RegExp(
              `\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${issueNumber}\\b`,
              "i"
            );

            // すでに同じIssueへのクローズ指定がある場合は何もしない
            if (closePattern.test(body)) {
              core.info(`PR body already contains a closing keyword for #${issueNumber}`);
              return;
            }

            const newBody = body.trim()
              ? `${body.trimEnd()}\n\n${closeText}`
              : closeText;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: newBody
            });
