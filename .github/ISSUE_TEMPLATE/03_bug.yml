name: "バグ修正"
description: "不具合・エラー・想定外の動作の報告"
title: "【バグ修正】"

labels: []

body:
  - type: textarea
    id: what
    attributes:
      label: "何が起きたか"
      description: "筆記必須。不具合の内容をできるだけ詳しく書く"
      placeholder: "例：送信ボタンを押してもメッセージが送信されない"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "再現手順"
      description: "筆記必須。不具合を再現するための手順を記載する"
      placeholder: "1. チャット画面を開く\n2. メッセージ入力\n3. 送信ボタン押下"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "本来の動作"
      description: "筆記必須。本来の動作を記載する"
      placeholder: "例：送信ボタンを押すとメッセージが送信される"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "ログ・エラー内容"
      description: "コンソール・サーバーログなど"
      placeholder: |
        TypeError: Cannot read properties of undefined