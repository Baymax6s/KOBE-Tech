name: "🐛 Bug Report"
description: "不具合・エラー・想定外の動作の報告"
title: "[BUG] "

labels: []

body:
  - type: textarea
    id: what
    attributes:
      label: "何が起きたか"
      placeholder: "例：送信ボタンを押してもメッセージが送信されない"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "再現手順"
      placeholder: "1. チャット画面を開く\n2. メッセージ入力\n3. 送信ボタン押下"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "本来の動作"